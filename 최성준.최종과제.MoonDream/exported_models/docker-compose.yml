version: '3.8'

services:
  moondream:
    build: .
    container_name: moondream-inference
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
